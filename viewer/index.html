<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <title>Atlas</title>
  <link rel="stylesheet" href="./viewer.css">
</head>
<body>
  <header class="site-header">
    <div class="identity">
      <span class="wordmark">Atlas</span>
      <span id="field-chip" class="field-chip">Field: knowledge</span>
    </div>
    <div class="view-controls" aria-label="View controls">
      <label class="toggle-control">
        <input id="routes-toggle" type="checkbox" checked>
        <span>Routes</span>
      </label>
    </div>
  </header>

  <div id="app-shell" class="app-shell">
    <main id="main" aria-live="polite"></main>
    <aside id="details" aria-label="Node details" hidden>
      <button id="close-details" class="close-details" type="button" aria-label="Close details">×</button>
      <div id="detail-content"></div>
    </aside>
  </div>

  <footer id="status-bar" class="status-bar" aria-live="polite"></footer>
  <script type="module" src="./viewer.js"></script>
</body>
</html>
