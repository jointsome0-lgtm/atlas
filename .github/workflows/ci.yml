name: CI

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_public_hygiene.py
      - run: python scripts/check_sdd_conventions.py check AGENTS.md
      - run: python scripts/check_decision_log.py --baseline 2026-07-15 DECISION-LOG.md
      - run: python -m unittest discover -s scripts -p "test_*.py"
